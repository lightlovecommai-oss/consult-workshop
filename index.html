<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>變現型顧問實戰營</title>
<meta name="apple-mobile-web-app-title" content="溝通變現">
<meta name="theme-color" content="#e8734a">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="common.css">
</head>
<body>
<div class="wrap">
  <div class="card" style="text-align:center;padding:2.5rem 1.25rem;margin-top:2rem;">
    <div style="font-size:32px;margin-bottom:1rem;">🔄</div>
    <div style="font-size:17px;font-weight:500;color:#2d1f0f;margin-bottom:6px;">識別中…</div>
    <div style="font-size:15px;color:#7a5636;">正在透過 LINE 確認你的身份</div>
  </div>
</div>

<script src="atpi-core.js"></script>
<script src="common.js"></script>
<script>
async function init() {
  try {
    /* 優先：URL 參數 ?id=（方便測試） */
    var params = new URLSearchParams(window.location.search);
    var urlId = params.get("id");

    await loadStudents();

    if (urlId) {
      var matched = STUDENTS.find(function(s) { return s.lineId === urlId && s.enrolled; });
      if (matched) {
        window.location.href = "dashboard.html?id=" + encodeURIComponent(urlId);
        return;
      }
    }

    /* 次要：透過 LIFF 取得 LINE userId */
    var sc = document.createElement("script");
    sc.src = "https://static.line-scdn.net/liff/edge/2/sdk.js";
    await new Promise(function(resolve, reject) { sc.onload = resolve; sc.onerror = reject; document.head.appendChild(sc); });
    await liff.init({liffId: LIFF_ID});

    if (liff.isLoggedIn()) {
      var p = await liff.getProfile();
      var matched2 = STUDENTS.find(function(s) { return s.lineId === p.userId && s.enrolled; });
      if (matched2) {
        window.location.href = "dashboard.html?id=" + encodeURIComponent(p.userId);
        return;
      }
    } else if (liff.isInClient() || params.get("app")) {
      // 在 LINE 內、或從桌面捷徑/按鈕帶 ?app=1 進來 → 走 LINE 登入認出身份（登入後回同網址再比對）
      liff.login();
      return;
    }
  } catch(e) {
    console.log("init error:", e);
  }

  /* 找不到學員 → 展示頁 */
  window.location.href = "showcase.html";
}

init();
</script>
</body>
</html>
